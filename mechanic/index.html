<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Davis Fleet — Shop Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232636;
    --border: #2e3245;
    --brand: #3b82f6;
    --brand-dim: #1d4ed8;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header-logo { width: 36px; height: 36px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0; }
  .header-title { font-weight: 700; font-size: 16px; line-height: 1.2; }
  .header-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .header-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; font-family: var(--mono); padding: 3px 8px; border-radius: 12px; display: none; }
  .header-badge.visible { display: block; }

  /* LOADING */
  #loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 12px; gap: 4px; }
  .tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: var(--sans); white-space: nowrap; transition: color 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
  .tab-count { font-family: var(--mono); font-size: 10px; background: var(--border); padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
  .tab-count.red { background: var(--red); color: #fff; }

  /* CONTENT */
  .content { padding: 16px; max-width: 900px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CARDS */
  .section-label { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .repair-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; transition: border-color 0.15s; }
  .repair-card:hover { border-color: var(--brand); }
  .repair-card.urgent { border-left: 3px solid var(--red); }
  .repair-card.warn { border-left: 3px solid var(--yellow); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .truck-num { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--brand); line-height: 1; }
  .truck-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .reason-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); white-space: nowrap; }

  /* REASON DROPDOWN */
  .reason-select { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); cursor: pointer; font-family: var(--sans); outline: none; }
  .reason-select:focus { border-color: var(--brand); }

  /* META */
  .card-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .meta-item { font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .meta-item span { color: var(--text); }
  .age-chip { font-size: 10px; font-weight: 700; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; }
  .age-chip.fresh { background: rgba(34,197,94,0.15); color: var(--green); }
  .age-chip.mid { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .age-chip.old { background: rgba(239,68,68,0.15); color: var(--red); }

  /* NOTES LOG */
  .notes-log { background: var(--surface2); border-radius: 6px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px; }
  .note-entry { display: flex; gap: 8px; align-items: flex-start; }
  .note-ts { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; margin-top: 1px; min-width: 85px; }
  .note-text { font-size: 12px; color: var(--text); flex: 1; line-height: 1.5; }
  .note-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .note-del:hover { color: var(--red); }
  .note-edit { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .note-edit:hover { color: var(--brand); }
  .note-edit-input { flex: 1; background: var(--surface); border: 1px solid var(--brand); border-radius: 4px; padding: 6px 8px; font: inherit; font-size: 12px; color: var(--text); resize: vertical; min-height: 36px; line-height: 1.5; outline: none; }
  .note-save { background: var(--brand); border: none; color: #fff; cursor: pointer; font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 4px; flex-shrink: 0; line-height: 1; }
  .note-save:hover { filter: brightness(1.1); }
  .note-cancel { background: none; border: 1px solid var(--muted); color: var(--muted); cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 4px; flex-shrink: 0; line-height: 1; }
  .note-cancel:hover { color: var(--text); border-color: var(--text); }
  .empty-notes { font-size: 11px; color: var(--muted); font-style: italic; }

  /* NOTE INPUT */
  .note-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .note-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 9px 12px; border-radius: 6px; outline: none; }
  .note-input::placeholder { color: var(--muted); }
  .note-input:focus { border-color: var(--brand); }
  .btn-add { padding: 9px 16px; background: var(--brand); color: #fff; border: none; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: var(--sans); transition: background 0.15s; }
  .btn-add:hover { background: var(--brand-dim); }
  .btn-add:active { transform: scale(0.97); }

  /* SHOP INPUT */
  .shop-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .shop-label { font-size: 11px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
  .shop-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 12px; padding: 6px 10px; border-radius: 6px; outline: none; }
  .shop-input::placeholder { color: var(--muted); }
  .shop-input:focus { border-color: var(--brand); }

  /* ACTIONS */
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-complete { padding: 9px 18px; background: var(--green); color: #fff; border: none; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: var(--sans); transition: opacity 0.15s; }
  .btn-complete:hover { opacity: 0.85; }

  /* LOG NEW REPAIR */
  .new-repair-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 10px; font-family: var(--mono); font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input, .form-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 8px 10px; border-radius: 6px; outline: none; }
  .form-input:focus, .form-select:focus { border-color: var(--brand); }
  .form-select option { background: var(--surface2); }
  .btn-log { width: 100%; padding: 11px; background: var(--brand); color: #fff; border: none; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: var(--sans); margin-top: 4px; transition: background 0.15s; }
  .btn-log:hover { background: var(--brand-dim); }

  /* HISTORY */
  .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; opacity: 0.75; }
  .closed-chip { font-size: 10px; font-weight: 700; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; background: rgba(34,197,94,0.15); color: var(--green); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--green); color: var(--green); font-family: var(--mono); font-size: 12px; font-weight: 700; padding: 10px 20px; border-radius: 8px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* SEPARATOR */
  .type-sep { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin: 16px 0 8px; padding: 4px 8px; background: var(--surface2); border-radius: 4px; display: inline-block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🔧</div>
  <div>
    <div class="header-title">Davis Fleet — Shop Portal</div>
    <div class="header-sub">mechanics.davisfleetmanagement.netlify.app</div>
  </div>
  <div class="header-badge" id="open-badge">0</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('open')" id="tab-open">
    Open <span class="tab-count red" id="count-open">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('log')" id="tab-log">Log New Repair</button>
  <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
    History <span class="tab-count" id="count-history">0</span>
  </button>
</div>

<div class="content">

  <!-- OPEN REPAIRS TAB -->
  <div class="tab-panel active" id="panel-open">
    <div id="loading-screen">
      <div class="spinner"></div>
      <div style="font-size:13px;color:var(--muted);font-family:var(--mono);">Loading repair data...</div>
    </div>
    <div id="open-list" style="display:none"></div>
  </div>

  <!-- LOG NEW REPAIR TAB -->
  <div class="tab-panel" id="panel-log">
    <div class="new-repair-form">
      <div class="section-label" style="margin-bottom:14px">Log New Repair</div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">Truck # <span id="truck-count" style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;">— loading...</span></label>
          <select class="form-select" id="new-truck" onchange="document.getElementById('new-truck-manual').value=''">
            <option value="">Select truck...</option>
          </select>
          <input class="form-input" id="new-truck-manual" placeholder="Or type truck # manually (e.g. 0608)"
            style="margin-top:6px;font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:1px;"
            onchange="document.getElementById('new-truck').value=''">
          <button type="button" onclick="reloadTrucks()" style="margin-top:6px;padding:6px 12px;font-size:11px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-family:var(--mono);">⟳ Reload truck list</button>
          <div id="truck-debug" style="margin-top:6px;font-size:10px;font-family:var(--mono);color:var(--muted);display:none;"></div>
        </div>
        <div class="form-field">
          <label class="form-label">Reason</label>
          <select class="form-select" id="new-reason">
            <option value="Mechanical Repair">Mechanical Repair</option>
            <option value="Planned Maintenance">Planned Maintenance</option>
            <option value="Tires">Tires</option>
            <option value="Body/Paint">Body/Paint</option>
            <option value="Electrical">Electrical</option>
            <option value="DOT Inspection">DOT Inspection</option>
            <option value="Accident Repair">Accident Repair</option>
            <option value="Waiting Parts">Waiting Parts</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Shop / Location</label>
          <input class="form-input" id="new-shop" placeholder="e.g. Peach State, in-house...">
        </div>
        <div class="form-field">
          <label class="form-label">Est. Return</label>
          <input class="form-input" type="date" id="new-est">
        </div>
      </div>
      <div class="form-field" style="margin-bottom:10px">
        <label class="form-label">Notes</label>
        <input class="form-input" id="new-notes" placeholder="What's wrong?">
      </div>
      <button class="btn-log" onclick="logNewRepair()">Log Repair</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-panel" id="panel-history">
    <div id="history-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ── FIREBASE (same config as main fleet app) ──────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCaaHZ0GuBoxl696-PzlgBQLPEad1xyiqw",
  authDomain: "davisfleetmanagement.firebaseapp.com",
  projectId: "davisfleetmanagement",
  storageBucket: "davisfleetmanagement.firebasestorage.app",
  messagingSenderId: "397276214754",
  appId: "1:397276214754:web:aa7bd4723c301fb876b5bb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── STORAGE HELPERS (mirrors App.jsx window.storage) ─────────────────
async function fsGet(key) {
  const doc = await db.collection("kv").doc(key).get();
  if (!doc.exists) return null;
  return JSON.parse(doc.data().v);
}
async function fsSet(key, value) {
  await db.collection("kv").doc(key).set({ v: JSON.stringify(value), ts: new Date().toISOString() });
}

// ── STATE ─────────────────────────────────────────────────────────────
let repairs = [];
let trucks = [];
const OOS_REASONS = ["Mechanical Repair","Planned Maintenance","Tires","Body/Paint","Electrical","DOT Inspection","Accident Repair","Waiting Parts","Other"];

// ── INIT ─────────────────────────────────────────────────────────────
async function init() {
  // Set up real-time listener for trucks (fires immediately + on changes)
  db.collection("kv").doc("fl-trucks").onSnapshot(snap => {
    if (!snap.exists) {
      console.warn("fl-trucks document does not exist in Firebase");
      trucks = [];
    } else {
      try {
        trucks = JSON.parse(snap.data().v) || [];
      } catch(e) {
        console.error("fl-trucks parse error:", e);
        trucks = [];
      }
    }
    populateTruckDropdown();
  }, err => {
    console.error("fl-trucks listener error:", err);
  });

  // Set up real-time listener for repairs — fires immediately with current
  // data AND every time the fleet app or any other client writes to fl-repairs.
  db.collection("kv").doc("fl-repairs").onSnapshot(snap => {
    if (!snap.exists) {
      repairs = [];
      render();
      return;
    }
    try {
      repairs = JSON.parse(snap.data().v) || [];
      render();
    } catch(e) {
      console.error("fl-repairs parse error:", e);
    }
  }, err => {
    document.getElementById("loading-screen").innerHTML =
      `<div style="color:var(--red);font-family:var(--mono);font-size:13px;text-align:center">
        Connection lost.<br><span style="color:var(--muted);">${err.message}</span>
      </div>`;
  });
}

// ── SAVE ─────────────────────────────────────────────────────────────
// Returns true on success, false on failure.
async function saveRepairs(arr) {
  try {
    // Always pass the array explicitly — never rely on the module-level
    // `repairs` reference which can be overwritten by onSnapshot mid-await.
    await fsSet("fl-repairs", arr !== undefined ? arr : repairs);
    return true;
  } catch(e) {
    console.error("saveRepairs failed:", e);
    showToast("⚠ Save failed: " + (e.message || "Firebase write error"), "var(--red)");
    return false;
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────
function dateStr(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return isNaN(d.getTime()) ? iso : d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}
function shortTs(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"})+" "+
         d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
function daysOld(iso) {
  if (!iso) return 0;
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}
function ageChip(iso) {
  const d = daysOld(iso);
  if (d >= 14) return `<span class="age-chip old">${d}d</span>`;
  if (d >= 7)  return `<span class="age-chip mid">${d}d</span>`;
  return `<span class="age-chip fresh">${d}d</span>`;
}
function prettyMake(mk, type) {
  // Normalize legacy abbreviations
  const map = { FRTLN: "Freightliner", INTL: "International", HINO: "Hino" };
  let m = (map[mk] || mk || "").trim();
  // Avoid duplication when make == type label (e.g. tractor with mk="Tractor" → "Tractor Tractor")
  const typeLabel = type === "tractor" ? "tractor" : "box";
  if (m.toLowerCase() === typeLabel || m.toLowerCase() === "tractor" && type === "tractor") return "";
  return m;
}
function truckLabel(id) {
  const t = trucks.find(x => x.id === id);
  if (!t) return `Truck #${id}`;
  const mk = prettyMake(t.mk, t.type);
  const type = t.type === "tractor" ? "Tractor" : "Box";
  const tr = t.tr === "A" ? "Auto" : "Man";
  const year = t.year ? ` ${t.year}` : "";
  return `${type}${mk ? " · " + mk : ""}${year} · ${tr}`;
}
function reasonSelectHtml(repairId, currentReason) {
  const opts = OOS_REASONS.map(r =>
    `<option value="${r}" ${r === currentReason ? "selected" : ""}>${r}</option>`
  ).join("");
  return `<select class="reason-select" onchange="updateReason('${repairId}', this.value)">${opts}</select>`;
}
// v2.10.47: single source of truth for note-entry HTML. Used by initial render,
// add, delete, and edit so the markup never drifts between code paths.
function noteEntryHtml(repairId, entry, idx) {
  return `<div class="note-entry" id="note-${repairId}-${idx}">
    <span class="note-ts">${shortTs(entry.ts)}</span>
    <span class="note-text" id="nt-${repairId}-${idx}">${escHtml(entry.text)}</span>
    <button class="note-edit" onclick="startEditNote('${repairId}',${idx})" title="Edit note">✎</button>
    <button class="note-del" onclick="deleteNote('${repairId}',${idx})" title="Delete note">✕</button>
  </div>`;
}
function renderNotesLog(repairId, log) {
  const logEl = document.getElementById(`log-${repairId}`);
  if (!logEl) return;
  logEl.innerHTML = log.length === 0
    ? `<div class="empty-notes">No notes yet.</div>`
    : log.map((e, i) => noteEntryHtml(repairId, e, i)).join("");
}
function notesLogHtml(repairId, notesLog, legacyNote) {
  // Build unified log: migrate legacy string if no notesLog
  let log = notesLog || [];
  if (!notesLog && legacyNote) {
    const r = repairs.find(x => x.id == repairId);
    log = [{ ts: r?.dateIn || new Date().toISOString(), text: legacyNote }];
  }
  const inner = log.length === 0
    ? `<div class="empty-notes">No notes yet.</div>`
    : log.map((e, i) => noteEntryHtml(repairId, e, i)).join("");
  return `<div class="notes-log" id="log-${repairId}">${inner}</div>`;
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showToast(msg, color) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = color || "var(--green)";
  t.style.color = color || "var(--green)";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  const open = repairs.filter(r => r.status === "open");
  const closed = repairs.filter(r => r.status !== "open");

  // Update counts
  document.getElementById("count-open").textContent = open.length;
  document.getElementById("count-history").textContent = closed.length;
  const badge = document.getElementById("open-badge");
  badge.textContent = open.length;
  badge.classList.toggle("visible", open.length > 0);

  renderOpen(open);
  renderHistory(closed);
}

function renderOpen(open) {
  document.getElementById("loading-screen").style.display = "none";
  const el = document.getElementById("open-list");
  el.style.display = "block";

  if (open.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✅</div>
      <div class="empty-title">All Clear</div>
      <div class="empty-sub">No open repair tickets right now.</div>
    </div>`;
    return;
  }

  // Split by truck type
  const boxRepairs = open.filter(r => {
    const t = trucks.find(x => x.id === r.truckId);
    return !t || t.type !== "tractor";
  });
  const tractorRepairs = open.filter(r => {
    const t = trucks.find(x => x.id === r.truckId);
    return t && t.type === "tractor";
  });

  let html = "";
  if (boxRepairs.length > 0) {
    html += `<div class="type-sep">📦 Box Trucks (${boxRepairs.length})</div>`;
    boxRepairs.forEach(r => { html += repairCardHtml(r); });
  }
  if (tractorRepairs.length > 0) {
    html += `<div class="type-sep">🚛 Tractors (${tractorRepairs.length})</div>`;
    tractorRepairs.forEach(r => { html += repairCardHtml(r); });
  }
  el.innerHTML = html;
}

function repairCardHtml(r) {
  const age = daysOld(r.dateIn);
  const urgentClass = age >= 14 ? "urgent" : age >= 7 ? "warn" : "";
  const log = r.notesLog || (r.notes ? [{ ts: r.dateIn, text: r.notes }] : []);
  return `
    <div class="repair-card ${urgentClass}" id="card-${r.id}">
      <div class="card-header">
        <div>
          <div class="truck-num">#${r.truckId}</div>
          <div class="truck-sub">${truckLabel(r.truckId)}</div>
        </div>
        ${reasonSelectHtml(r.id, r.reason)}
      </div>
      <div class="card-meta">
        <div class="meta-item">In: <span>${dateStr(r.dateIn)}</span></div>
        ${r.estReturn ? `<div class="meta-item">Est return: <span>${dateStr(r.estReturn)}</span></div>` : ""}
        ${ageChip(r.dateIn)}
      </div>
      <div class="shop-row">
        <span class="shop-label">Shop:</span>
        <input class="shop-input" placeholder="Shop / location..." value="${escHtml(r.shop || "")}"
          onblur="updateShop('${r.id}', this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      ${notesLogHtml(r.id, r.notesLog, r.notes && !r.notesLog ? r.notes : null)}
      <div class="note-input-row">
        <input class="note-input" id="ni-${r.id}" placeholder="Add a note..." onkeydown="if(event.key==='Enter'){event.preventDefault();addNote('${r.id}')}">
        <button class="btn-add" onclick="addNote('${r.id}')">Add</button>
      </div>
      <div class="card-actions">
        <button class="btn-complete" onclick="closeRepair('${r.id}')">✓ Repair Completed</button>
      </div>
    </div>`;
}

function renderHistory(closed) {
  const el = document.getElementById("history-list");
  if (closed.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No repair history yet.</div></div>`;
    return;
  }
  const sorted = [...closed].sort((a, b) => (b.dateClosed || "").localeCompare(a.dateClosed || ""));
  el.innerHTML = sorted.map(r => {
    const log = r.notesLog || (r.notes ? [{ ts: r.dateIn, text: r.notes }] : []);
    const notesSummary = log.length > 0
      ? `<div style="margin-top:6px;display:flex;flex-direction:column;gap:3px;">${
          log.map(e => `<div style="font-size:11px;color:var(--muted);"><span style="color:var(--muted);font-family:var(--mono);font-size:10px;">${shortTs(e.ts)} </span>${escHtml(e.text)}</div>`).join("")
        }</div>`
      : "";
    return `<div class="history-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div>
          <span style="font-family:var(--mono);font-weight:700;color:var(--text)">#${r.truckId}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:8px;">${truckLabel(r.truckId)}</span>
        </div>
        <span class="closed-chip">CLOSED</span>
      </div>
      <div style="font-size:12px;color:var(--red);font-weight:600;margin-top:4px;">${r.reason}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;">
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono);">In: <span style="color:var(--text)">${dateStr(r.dateIn)}</span></span>
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono);">Closed: <span style="color:var(--green)">${dateStr(r.dateClosed)}</span></span>
        ${r.shop ? `<span style="font-size:11px;color:var(--muted);font-family:var(--mono);">Shop: <span style="color:var(--text)">${escHtml(r.shop)}</span></span>` : ""}
      </div>
      ${notesSummary}
    </div>`;
  }).join("");
}

// ── ACTIONS ───────────────────────────────────────────────────────────
async function updateReason(id, value) {
  const updated = repairs.map(r => r.id == id ? {...r, reason: value} : r);
  const ok = await saveRepairs(updated);
  if (ok) showToast("Reason updated");
}

async function updateShop(id, value) {
  const r = repairs.find(x => x.id == id);
  if (!r || value === (r.shop || "")) return;
  const updated = repairs.map(r2 => r2.id == id ? {...r2, shop: value} : r2);
  const ok = await saveRepairs(updated);
  if (ok) showToast("Shop saved");
}

async function addNote(id) {
  const inp = document.getElementById(`ni-${id}`);
  const text = (inp?.value || "").trim();
  if (!text) return;
  const r = repairs.find(x => x.id == id);
  if (!r) return;
  const existingLog = r.notesLog || (r.notes ? [{ ts: r.dateIn || new Date().toISOString(), text: r.notes }] : []);
  const newEntry = { ts: new Date().toISOString(), text };
  const newLog = [...existingLog, newEntry];
  const updated = repairs.map(r2 => r2.id == id
    ? { ...r2, notesLog: newLog, notes: "" }
    : r2
  );
  const ok = await saveRepairs(updated);
  if (!ok) return;
  inp.value = "";
  renderNotesLog(id, newLog);
  showToast("Note added ✓");
}

async function deleteNote(id, idx) {
  const r = repairs.find(x => x.id == id);
  if (!r || !r.notesLog) return;
  const newLog = r.notesLog.filter((_, i) => i !== idx);
  const updated = repairs.map(r2 => r2.id == id ? {...r2, notesLog: newLog} : r2);
  const ok = await saveRepairs(updated);
  if (!ok) return;
  renderNotesLog(id, newLog);
  showToast("Note deleted");
}

// v2.10.47: edit note. Click ✎ → text becomes an inline textarea with
// Save/Cancel buttons. Enter saves (Shift+Enter newline), Escape cancels.
function startEditNote(id, idx) {
  const r = repairs.find(x => x.id == id);
  if (!r) return;
  const log = r.notesLog || (r.notes ? [{ ts: r.dateIn || new Date().toISOString(), text: r.notes }] : []);
  const entry = log[idx];
  if (!entry) return;
  const wrap = document.getElementById(`note-${id}-${idx}`);
  if (!wrap) return;
  // Swap row to edit mode
  wrap.innerHTML = `
    <span class="note-ts">${shortTs(entry.ts)}</span>
    <textarea class="note-edit-input" id="ne-${id}-${idx}"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEditNote('${id}',${idx})}else if(event.key==='Escape'){event.preventDefault();cancelEditNote('${id}',${idx})}"
    >${escHtml(entry.text)}</textarea>
    <button class="note-save" onclick="saveEditNote('${id}',${idx})" title="Save (Enter)">✓</button>
    <button class="note-cancel" onclick="cancelEditNote('${id}',${idx})" title="Cancel (Esc)">✕</button>
  `;
  const ta = document.getElementById(`ne-${id}-${idx}`);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

async function saveEditNote(id, idx) {
  const ta = document.getElementById(`ne-${id}-${idx}`);
  if (!ta) return;
  const newText = ta.value.trim();
  const r = repairs.find(x => x.id == id);
  if (!r) return;
  const log = r.notesLog || (r.notes ? [{ ts: r.dateIn || new Date().toISOString(), text: r.notes }] : []);
  if (!log[idx]) return;
  if (newText === "") {
    if (!confirm("Empty note — delete it instead?")) return;
    return deleteNote(id, idx);
  }
  // Preserve original ts; optionally tag editedAt for audit trail
  const editedEntry = { ...log[idx], text: newText, editedAt: new Date().toISOString() };
  const newLog = log.map((e, i) => i === idx ? editedEntry : e);
  const updated = repairs.map(r2 => r2.id == id ? {...r2, notesLog: newLog} : r2);
  const ok = await saveRepairs(updated);
  if (!ok) return;
  renderNotesLog(id, newLog);
  showToast("Note updated ✓");
}

function cancelEditNote(id, idx) {
  const r = repairs.find(x => x.id == id);
  if (!r) return;
  const log = r.notesLog || (r.notes ? [{ ts: r.dateIn || new Date().toISOString(), text: r.notes }] : []);
  renderNotesLog(id, log);
}

async function closeRepair(id) {
  if (!confirm("Mark this repair as completed?")) return;
  const updated = repairs.map(r => r.id == id
    ? {...r, status: "closed", dateClosed: new Date().toISOString()}
    : r
  );
  const ok = await saveRepairs(updated);
  if (ok) showToast("✓ Repair closed", "var(--green)");
}

async function logNewRepair() {
  const truckId = document.getElementById("new-truck").value ||
                  document.getElementById("new-truck-manual").value.trim().toUpperCase();
  const reason = document.getElementById("new-reason").value;
  const shop = document.getElementById("new-shop").value.trim();
  const est = document.getElementById("new-est").value;
  const notes = document.getElementById("new-notes").value.trim();
  if (!truckId) { showToast("Select a truck first", "var(--red)"); return; }
  const btn = document.querySelector(".btn-log");
  btn.disabled = true;
  btn.textContent = "Saving...";
  const rec = {
    id: Date.now(),
    truckId,
    reason,
    shop,
    estReturn: est || null,
    notesLog: notes ? [{ ts: new Date().toISOString(), text: notes }] : [],
    notes: "",
    dateIn: new Date().toISOString(),
    dateClosed: null,
    status: "open",
    cost: 0
  };
  // Build the new array explicitly — don't rely on module-level `repairs`
  // which can be overwritten by onSnapshot mid-await.
  const newRepairs = [rec, ...repairs];
  const ok = await saveRepairs(newRepairs);
  btn.disabled = false;
  btn.textContent = "Log Repair";
  if (!ok) return; // error toast already shown by saveRepairs
  // Reset form
  document.getElementById("new-truck").value = "";
  document.getElementById("new-truck-manual").value = "";
  document.getElementById("new-shop").value = "";
  document.getElementById("new-est").value = "";
  document.getElementById("new-notes").value = "";
  showToast("Repair logged ✓", "var(--green)");
  switchTab("open");
}

function populateTruckDropdown() {
  const sel = document.getElementById("new-truck");
  const countEl = document.getElementById("truck-count");
  sel.innerHTML = `<option value="">Select truck...</option>`;
  // Box trucks first, then tractors
  const sorted = [
    ...trucks.filter(t => t.type !== "tractor").sort((a, b) => a.id.localeCompare(b.id)),
    ...trucks.filter(t => t.type === "tractor").sort((a, b) => a.id.localeCompare(b.id))
  ];
  sorted.forEach(t => {
    const mk = prettyMake(t.mk, t.type);
    const type = t.type === "tractor" ? "Tractor" : "Box";
    const year = t.year ? ` ${t.year}` : "";
    const opt = document.createElement("option");
    opt.value = t.id;
    // v2.10.46: skip duplicated make (e.g. tractor with mk="Tractor"); show year if set
    opt.textContent = `#${t.id} — ${type}${mk ? " " + mk : ""}${year}`;
    sel.appendChild(opt);
  });
  if (countEl) {
    if (trucks.length === 0) {
      countEl.textContent = "— no trucks loaded";
      countEl.style.color = "var(--red)";
    } else {
      countEl.textContent = `(${trucks.length} trucks)`;
      countEl.style.color = "var(--green)";
    }
  }
}

// Manual force-reload — bypasses snapshot cache and re-fetches directly
async function reloadTrucks() {
  const dbg = document.getElementById("truck-debug");
  dbg.style.display = "block";
  dbg.style.color = "var(--muted)";
  dbg.textContent = "Reloading from Firebase...";
  try {
    const doc = await db.collection("kv").doc("fl-trucks").get();
    if (!doc.exists) {
      dbg.style.color = "var(--red)";
      dbg.textContent = "✗ Firestore document kv/fl-trucks does not exist. The fleet app needs to save trucks first.";
      return;
    }
    const raw = doc.data().v;
    if (!raw) {
      dbg.style.color = "var(--red)";
      dbg.textContent = "✗ Document exists but .v field is empty. Document data: " + JSON.stringify(doc.data()).substring(0, 200);
      return;
    }
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) {
      dbg.style.color = "var(--red)";
      dbg.textContent = "✗ Parsed value is not an array. Type: " + typeof parsed + ". Sample: " + JSON.stringify(parsed).substring(0, 100);
      return;
    }
    trucks = parsed;
    populateTruckDropdown();
    dbg.style.color = "var(--green)";
    dbg.textContent = `✓ Loaded ${trucks.length} trucks. First: ${trucks[0] ? `#${trucks[0].id} (${trucks[0].mk || "?"})` : "none"}`;
  } catch(e) {
    dbg.style.color = "var(--red)";
    dbg.textContent = "✗ Error: " + (e.message || e);
  }
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`tab-${name}`).classList.add("active");
  document.getElementById(`panel-${name}`).classList.add("active");
}

// ── BOOT ──────────────────────────────────────────────────────────────
init();
</script>
