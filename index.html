<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Davis Fleet Management</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1e5b92">
<link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e5b92'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>F</text></svg>">
<style>
  body { margin: 0; font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif; background: #f5f7fa; }
  #loading { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 12px; color: #6b7785; font-size: 14px; }
  #loading .spin { width: 36px; height: 36px; border: 3px solid #dde3ea; border-top: 3px solid #1e5b92; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>
<div id="root"><div id="loading"><div class="spin"></div>Loading Fleet Management...</div></div>
<script>
// ══ Firebase Config ══
const firebaseConfig = {
  apiKey: "AIzaSyCaaHZ0GuBoxl696-PzlgBQLPEad1xyiqw",
  authDomain: "davisfleetmanagement.firebaseapp.com",
  projectId: "davisfleetmanagement",
  storageBucket: "davisfleetmanagement.firebasestorage.app",
  messagingSenderId: "397276214754",
  appId: "1:397276214754:web:aa7bd4723c301fb876b5bb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ══ Storage shim — same API as Claude artifact storage, backed by Firestore ══
window.storage = {
  async get(key) { try { const doc = await db.collection("kv").doc(key).get(); if (!doc.exists) throw new Error("not found"); return { key, value: doc.data().v }; } catch (e) { throw e; } },
  async set(key, value) { try { await db.collection("kv").doc(key).set({ v: value, ts: new Date().toISOString() }); return { key, value }; } catch (e) { return null; } },
  async delete(key) { try { await db.collection("kv").doc(key).delete(); return { key, deleted: true }; } catch (e) { return null; } },
  async list(prefix) { try { const snap = await db.collection("kv").get(); const keys = []; snap.forEach(doc => { if (!prefix || doc.id.startsWith(prefix)) keys.push(doc.id); }); return { keys }; } catch (e) { return { keys: [] }; } }
};

// ══ Load App.jsx, strip imports/exports for browser, compile with Babel, mount ══
fetch('App.jsx')
  .then(r => { if (!r.ok) throw new Error('Failed to load App.jsx'); return r.text(); })
  .then(code => {
    code = code.replace(/^import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*\n/gm, '');
    code = code.replace(/export\s+default\s+function\s+App/g, 'function App');
    const fullCode = 'const { useState, useEffect, useCallback, useMemo } = React;\n' + code +
      '\nconst root = ReactDOM.createRoot(document.getElementById("root"));\nroot.render(React.createElement(App));';
    const compiled = Babel.transform(fullCode, { presets: ['react'] }).code;
    (new Function(compiled))();
  })
  .catch(err => {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:#c0392b;font-size:16px;">Error loading app: ' + err.message + '</div>';
  });
</script>
</body>
</html>
